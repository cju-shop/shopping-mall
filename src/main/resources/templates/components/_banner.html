<div th:fragment="bannerSlider(banners)">
    <section class="banner-slider banner--no-arrows" aria-label="제휴사 광고">
        <div class="slider-track">
            <a class="slide" th:each="b : ${banners}" th:href="${b['href']}" target="_blank" rel="noopener">
                <img th:src="${b['img']}" th:alt="${b['alt']}">
            </a>
        </div>

        <!-- 좌우 버튼 제거됨 -->

        <!-- 도트만 유지 -->
        <div class="dots">
            <button class="dot"
                    th:each="b, iStat : ${banners}"
                    th:attr="data-index=${iStat.index}"
                    aria-label="배너 이동"></button>
        </div>
    </section>
</div>
