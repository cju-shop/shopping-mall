<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>장바구니</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
</head>
<body>
<div th:replace="components/_header :: header"></div>

<main class="container">
    <section class="cart-section">
        <h1 class="cart-title">장바구니</h1>

        <div class="cart-content">
            <div class="cart-items-wrapper">
                <div class="cart-header">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="selectAll" checked>
                        <span>전체 선택</span>
                    </label>
                    <button class="delete-selected-btn" id="deleteSelectedBtn">선택 삭제</button>
                </div>

                <div id="cartItemsContainer" class="cart-items">
                    <!-- 장바구니 아이템이 JavaScript로 렌더링됩니다 -->
                </div>

                <div id="emptyCart" class="empty-cart" style="display: none;">
                    <div class="empty-icon">
                        <img th:src="@{/img/icons/ant-design_shopping-cart-outlined.png}" alt="빈 장바구니">
                    </div>
                    <p class="empty-text">장바구니가 비어있습니다.</p>
                    <a th:href="@{/}" class="continue-shopping-btn">쇼핑 계속하기</a>
                </div>
            </div>

            <aside class="cart-summary">
                <h2>주문 요약</h2>
                <div class="summary-row">
                    <span>상품 금액</span>
                    <span id="subtotalAmount">0원</span>
                </div>
                <div class="summary-row">
                    <span>할인 금액</span>
                    <span id="discountAmount" class="discount">-0원</span>
                </div>
                <div class="summary-row">
                    <span>배송비</span>
                    <span id="shippingFee">0원</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row total">
                    <span>총 결제 금액</span>
                    <span id="totalAmount">0원</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">주문하기</button>
            </aside>
        </div>
    </section>
</main>

<div th:replace="~{components/_footer}"></div>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
