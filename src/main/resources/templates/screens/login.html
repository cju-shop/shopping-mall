<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button
        {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0056b3;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        .error { color: #d9534f; }
        .success { color: #28a745; }
    </style>
</head>
<body>
<h2>로그인 (JWT)</h2>

<div>
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" placeholder="아이디" required>
</div>
<div>
    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" placeholder="비밀번호" required>
</div>

<button type="button" onclick="jwtLogin()">JWT 로그인</button>

<div id="message"></div>

<script>
    function showMessage(msg, isError = false) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = msg;
        messageDiv.className = isError ? 'error' : 'success';
    }

    async function jwtLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showMessage('아이디와 비밀번호를 입력하세요', true);
            return;
        }

        showMessage('로그인 중...');

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                const err = await response.json();
                throw err;
            }

            const data = await response.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                showMessage('로그인 성공! 이동합니다.');
                setTimeout(() => { globalThis.location.href = '/'; }, 1000);
            } else {
                showMessage('로그인 실패: ' + (data.error || '알 수 없는 오류'), true);
            }
        } catch (error) {
            console.error(error);
            showMessage(error.error || '네트워크 오류', true);
        }
    }

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            jwtLogin();
        }
    });
</script>
</body>
</html>
