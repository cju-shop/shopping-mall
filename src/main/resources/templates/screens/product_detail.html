<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>상품 리스트</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/product_detail.css}">
</head>
<body>
<div th:replace="components/_header :: header"></div>
<main class="container">
    <section class="detail-top">
        <div class="gallery">
            <div class="preview">
                <img th:src="${product != null ? product.thumbnail : 'https://picsum.photos/seed/101/800/600'}"
                     alt="상품 이미지" id="previewImg"/>

            </div>

            <div class="thumbs" id="thumbs">
                <!-- 썸네일들(샘플 5장). 필요 시 서버에서 주입 가능 -->
                <img th:src="${product != null ? product.thumbnail : 'https://picsum.photos/seed/101/200/150'}"
                     alt="썸네일1" class="thumb is-active">

                <img src="https://picsum.photos/seed/102/200/150" alt="썸네일2" class="thumb">
                <img src="https://picsum.photos/seed/103/200/150" alt="썸네일3" class="thumb">
                <img src="https://picsum.photos/seed/104/200/150" alt="썸네일4" class="thumb">
                <img src="https://picsum.photos/seed/105/200/150" alt="썸네일5" class="thumb">
            </div>
        </div>

        <div class="info">
            <p class="breadcrumb">
                    <img src="/img/icons/ic_outline-home.png" alt="홈 아이콘" class="home-icon">
                    젠티스

            </p>

            <h1 class="title" th:text="${product != null} ? ${product.name} : 'More Square Fabric Bed'">More Square Fabric Bed</h1>

            <p class="price">
                <span th:text="${#numbers.formatInteger(product.basePrice, 3, 'COMMA')} + '원'">금액</span>
            </p>

            <div class="rating">
                <span class="stars" aria-label="별점 4.8/5">⭐⭐⭐⭐⭐</span>
                <span class="score">4.8</span>
                <span class="count">(124)</span>
            </div>

            <div class="options">
                <label class="opt">
                    <select>
                        <option value="" disabled selected hidden>색상을 선택하세요</option>
                        <option>아이보리</option>
                        <option>그레이</option>
                        <option>베이지</option>
                    </select>
                </label>

                <label class="opt">
                    <select>
                        <option value="" disabled selected hidden>사이즈를 선택하세요</option>
                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                    </select>
                </label>


            </div>
            <div class="quantity-box">
                <p class="qty-label">수량</p>
                <div class="qty-control">
                    <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
                    <input id="quantity" type="text" value="1" readonly>
                    <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
            </div>

            <div class="total-price">
                <p>총 상품 금액</p>
                <strong>0원</strong>
            </div>


            <div class="cta">
                <button class="btn btn-dark">바로 구매</button>

                <!-- 장바구니 버튼 -->
                <button class="btn btn-outline">
                    <img src="/img/icons/ant-design_shopping-cart-outlined.png" alt="장바구니" class="cart-icon">
                </button>

                <!-- 찜하기 버튼 -->
                <button class="btn icon-only like-btn" aria-label="찜하기">
                    <img src="/img/icons/heart-outline.png" alt="찜하기" class="heart-icon">
                </button>
            </div>
        </div>
    </section>

    <section class="tabs">
        <ul class="tab-menu">
            <li class="tab-item active" data-tab="info">상품정보</li>
            <li class="tab-item" data-tab="review">
                리뷰 (<span th:text="${reviewList != null ? reviewList.size() : 0}">0</span>)
            </li>
            <li class="tab-item" data-tab="qna">
                Q&A (<span th:text="${qnaList != null ? qnaList.size() : 0}">0</span>)
            </li>
        </ul>
    </section>

    <section id="info" class="hero tab-content-section active">
        <div class="product-detail">
            <div class="product-img-box">
                <img th:src="@{/img/product_detail/test1.png}" alt="제품 전경">
            </div>
            <div class="product-img-box">
                <img th:src="@{/img/product_detail/test2.png}" alt="제품 전경">
            </div>
            <div class="product-img-box">
                <img th:src="@{/img/product_detail/test3.png}" alt="제품 전경">
            </div>
            <button id="toggle-btn" class="toggle-btn">상품정보 더보기 ˅</button>
        </div>
    </section>
    <section id="review" class="review-section tab-content-section">
        <div class="reviews-container">
            <h2>상품 리뷰</h2>

            <!-- Controller에서 전달한 reviews 리스트를 반복 출력 -->
            <div th:each="review : ${reviewList}" class="review-card">
                <div class="review-header">
                    <div class="reviewer-info">
                        <img src="https://via.placeholder.com/50" alt="프로필" class="profile-img">
                        <div class="reviewer-details">
                            <!-- review.user 값 출력 -->
                            <strong th:text="${review.member}">사용자명</strong>
                            <div class="review-stars">⭐⭐⭐⭐⭐</div>
                        </div>
                    </div>
                </div>

                <!-- review.content 값 출력 -->
                <p class="review-text" th:text="${review.content}">리뷰 내용</p>
                <hr class="review-divider">
            </div>
        </div>
    </section>

    <section id="qna" class="qna-section tab-content-section">
        <div class="qna-container">
            <!-- 질문 입력 폼 -->
            <div class="qna-input-box">
                <label>
                    <textarea placeholder="문의 내용을 작성해주세요" class="qna-textarea"></textarea>
                </label>
            </div>

            <!-- Q&A 리스트 -->
            <div th:if="${qnaList != null and !qnaList.isEmpty()}">
                <div th:each="qna, iterStat : ${qnaList}" class="qna-item">

                    <!-- 질문 영역 -->
                    <div class="qna-header qna-question"
                         th:classappend="${qna.hasAnswer} ? 'has-answer' : ''"
                         th:onclick="'toggleAnswer(' + ${iterStat.index} + ')'">
                        <span class="qna-badge">질문</span>
                        <div class="qna-text">
                            <p th:text="${qna.question}">질문 내용</p>
                            <p th:if="${qna.questionDetail != null and !qna.questionDetail.isEmpty()}"
                               class="question-detail"
                               th:text="${qna.questionDetail}">상세 질문</p>
                        </div>
                    </div>

                    <!-- 답변 영역 (있을 경우만 표시) -->
                    <div th:if="${qna.hasAnswer}"
                         class="qna-answer-detail"
                         th:id="'answer-' + ${iterStat.index}"
                         style="display: none;">
                        <div class="qna-header qna-answer">
                            <span class="qna-badge answer-badge">답변</span>
                            <div class="qna-text">
                                <p th:text="${qna.answer}">답변 내용</p>
                            </div>
                        </div>
                    </div>

                    <!-- 답변 대기 중 표시 -->
                    <div th:if="${!qna.hasAnswer}" class="qna-waiting">
                        <span class="waiting-text">답변 대기 중</span>
                    </div>
                </div>
            </div>

            <!-- Q&A 없을 때 -->
            <div th:if="${qnaList == null or qnaList.isEmpty()}" class="no-qna">
                <p>아직 등록된 Q&A가 없습니다.</p>
            </div>

            <!-- 더보기 버튼 -->
            <div class="qna-more-btn-wrap">
                <button class="qna-more-btn">상품정보 더보기 ˅</button>
            </div>
        </div>
    </section>


    <section class="related-products">
        <h3>이런 상품은 어때요?</h3>
        <div class="product-list">
            <div class="product-card">
                <img src="https://picsum.photos/seed/201/360/480" alt="">
                <p class="name">패브릭 체어</p>
                <p class="price">126,540원</p>
            </div>
            <div class="product-card">
                <img src="https://picsum.photos/seed/202/480/360" alt="">
                <p class="name">로우 테이블</p>
                <p class="price">400,500원</p>
            </div>
            <div class="product-card">
                <img src="https://picsum.photos/seed/203/480/360" alt="">
                <p class="name">우드 협탁</p>
                <p class="price">123,120원</p>
            </div>
            <div class="product-card">
                <img src="https://picsum.photos/seed/204/480/360" alt="">
                <p class="name">라탄 바스켓</p>
                <p class="price">986,120원</p>
            </div>
            <div class="product-card">
                <img src="https://picsum.photos/seed/205/480/360" alt="">
                <p class="name">코튼 러그</p>
                <p class="price">396,540원</p>
            </div>
        </div>
    </section>

</main>
<div th:replace="~{components/_footer}"></div>
<script th:src="@{/js/product_detail.js}"></script>
</body>
</html>
