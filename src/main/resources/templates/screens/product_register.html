<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>

    <script>
        async function loadChildCategories(parentId) {
            const childSelect = document.getElementById("childCategory");
            childSelect.innerHTML = `<option value="">(선택 안 함)</option>`;

            if (!parentId) return;

            try {
                const res = await fetch(`/categories/${parentId}/children`);
                if (!res.ok) {
                    console.error("하위 카테고리 조회 실패:", res.status);
                    return;
                }
                const list = await res.json(); // [{id, name}, ...]

                // ✅ forEach → for...of
                for (const c of list) {
                    const opt = document.createElement("option");
                    opt.value = c.id;
                    opt.textContent = c.name;
                    childSelect.appendChild(opt);
                }
            } catch (e) {
                console.error("하위 카테고리 조회 중 오류:", e);
            }
        }


        let optionTypes = [];

        function addOptionType() {
            optionTypes.push({ name: "", values: [] });
            renderOptionTypes();
            renderCombination();
        }

        function removeOptionType(index) {
            optionTypes.splice(index, 1);
            renderOptionTypes();
            renderCombination();
        }

        function addOptionValue(index, value) {
            if (!value.trim()) return;
            optionTypes[index].values.push(value.trim());
            renderOptionTypes();
            renderCombination();
        }

        function removeOptionValue(typeIndex, valueIndex) {
            optionTypes[typeIndex].values.splice(valueIndex, 1);
            renderOptionTypes();
            renderCombination();
        }
        function renderOptionTypes() {
            const area = document.getElementById("optionTypeArea");
            area.innerHTML = "";

            for (const [i, opt] of optionTypes.entries()) {
                const box = document.createElement("div");
                box.style.margin = "12px 0";

                box.innerHTML = `
        <div>
            <strong>옵션명:</strong>
            <input type="text"
               value="${opt.name}"
               placeholder="예: 사이즈"
               oninput="
                   optionTypes[${i}].name = this.value;
                   const hiddenNameInput = document.getElementById('optionType-name-${i}');
                   if (hiddenNameInput) hiddenNameInput.value = this.value;
            ">
            <button type="button" onclick="removeOptionType(${i})">옵션 삭제</button>
        </div>

        <div style="margin-top:6px;">
            <strong>옵션 항목:</strong>
            <input type="text"
                   placeholder="옵션 항목 입력 후 ENTER"
                   onkeydown="if(event.key==='Enter'){addOptionValue(${i}, this.value); this.value='';}">
        </div>

        <div style="margin-top:6px;">
            ${
                    opt.values
                        .map((v, vi) =>
                            `<span style="display:inline-block;background:#eee;padding:4px 8px;margin:2px;border-radius:4px;">
                            ${v}
                            <button type="button" onclick="removeOptionValue(${i},${vi})">x</button>
                         </span>`
                        ).join("")
                }
        </div>
    `;

                // hidden inputs for server binding
                const hidden = document.createElement("div");
                hidden.style.display = "none";

                let hiddenHtml = `
                    <input type="hidden"
                           id="optionType-name-${i}"
                           name="optionTypes[${i}].name"
                           value="${opt.name}">
                `;

                for (const [vi, v] of opt.values.entries()) {
                    hiddenHtml += `
            <input type="hidden"
                   name="optionTypes[${i}].values[${vi}].value"
                   value="${v}">
        `;
                }

                hidden.innerHTML = hiddenHtml;
                box.appendChild(hidden);
                area.appendChild(box);
            }
        }


        function renderCombination() {
            const body = document.getElementById("optionCombinationBody");
            body.innerHTML = "";

            if (optionTypes.length === 0) return;
            if (optionTypes.some(opt => opt.values.length === 0)) return;

            // Cartesian product
            let combinations = optionTypes[0].values.map(v => [v]);
            for (let i = 1; i < optionTypes.length; i++) {
                const newComb = [];
                for (const base of combinations) {
                    for (const value of optionTypes[i].values) {
                        newComb.push([...base, value]);
                    }
                }
                combinations = newComb;
            }

            let idx = 0;
            for (const comb of combinations) {
                const tr = document.createElement("tr");
                const label = comb.join(" × ");

                tr.innerHTML = `
            <td>
                ${label}
                <input type="hidden" name="variants[${idx}].label" value="${label}">
            </td>

            <td>
                <input type="number" name="variants[${idx}].extraPrice" value="0">
            </td>

            <td>
                <input type="number" name="variants[${idx}].stockQty" value="0">
            </td>

            <td>
                <input type="hidden" name="_variants[${idx}].active" value="false">
                <input type="checkbox" name="variants[${idx}].active" value="true" checked>
            </td>

            <td>
                <button type="button" onclick="this.closest('tr').remove(); renumberVariantRows();">
                    삭제
                </button>
            </td>
        `;

                body.appendChild(tr);
                idx++;
            }

            // ⭐ 추가: 렌더링 직후에도 인덱스 보정
            renumberVariantRows();
        }






        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("category").addEventListener("change", (e) => {
                const parentId = e.target.value;
                loadChildCategories(parentId);
            });

            optionTypes = [
                { name: "사이즈", values: ["Free", "L"] },
                { name: "색상", values: ["Green", "Beige"] }
            ];
            renderOptionTypes();
            renderCombination();
        });
    </script>
</head>
<body>
<h1>상품 등록</h1>

<form th:action="@{/register}" method="post" enctype="multipart/form-data">
    <div>
        <label for="category">상위 카테고리:</label>
        <select id="category" name="parentCategoryId" required>
            <option value="">선택하세요</option>
            <option th:each="cat : ${parentCategories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}">
            </option>
        </select>
    </div>

    <div>
        <label for="childCategory">하위 카테고리:</label>
        <select id="childCategory" name="childCategoryId">
            <option value="">(선택 안 함)</option>
        </select>
    </div>

    <div>
        <label for="name">상품명:</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div>
        <label for="price">가격:</label>
        <input type="number" id="price" name="price" required>
    </div>

    <div>
        <label for="image">상품 이미지:</label>
        <input type="file" id="image" name="image" accept="image/*" required>
    </div>

    <h3>옵션</h3>

    <div id="optionTypeArea"></div>
    <button type="button" onclick="addOptionType()">옵션 타입 추가</button>

    <hr>
    <h4>옵션 조합</h4>
    <table id="optionCombinationTable" border="1" style="width:100%; border-collapse: collapse;">
        <thead>
        <tr>
            <th>옵션명</th>
            <th>추가 금액</th>
            <th>재고 수량</th>
            <th>사용 여부</th>
            <th>삭제</th>
        </tr>
        </thead>
        <tbody id="optionCombinationBody">
        </tbody>
    </table>

    <div style="margin-top: 16px;">
        <button type="submit">등록하기</button>
    </div>
</form>
</body>
</html>
